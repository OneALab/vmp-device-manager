<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VMP Project Manager</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface2: #242836;
    --border: #2e3348;
    --text: #e2e4ed;
    --text-dim: #8b8fa3;
    --accent: #5b8aff;
    --accent-hover: #7aa2ff;
    --danger: #e5484d;
    --danger-hover: #f27067;
    --danger-bg: rgba(229, 72, 77, 0.1);
    --success: #30a46c;
    --warning: #f5a623;
    --warning-bg: rgba(245, 166, 35, 0.12);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  .app {
    max-width: 960px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* Header */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo {
    width: 40px;
    height: 40px;
    background: linear-gradient(135deg, var(--accent), #8b5cf6);
    border-radius: var(--radius);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: 700;
    color: #fff;
  }

  .header h1 {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.3px;
  }

  .header h1 span {
    color: var(--text-dim);
    font-weight: 400;
    font-size: 14px;
    margin-left: 8px;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
  }

  .btn:hover { background: var(--border); }

  .btn-danger {
    background: var(--danger-bg);
    border-color: rgba(229, 72, 77, 0.3);
    color: var(--danger);
  }

  .btn-danger:hover {
    background: rgba(229, 72, 77, 0.2);
    border-color: var(--danger);
  }

  .btn-sm { padding: 5px 10px; font-size: 12px; }

  /* Warning banner */
  .banner {
    padding: 12px 16px;
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 13px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .banner-warning {
    background: var(--warning-bg);
    border: 1px solid rgba(245, 166, 35, 0.25);
    color: var(--warning);
  }

  .banner-danger {
    background: var(--danger-bg);
    border: 1px solid rgba(229, 72, 77, 0.25);
    color: var(--danger);
  }

  .banner-success {
    background: rgba(48, 164, 108, 0.1);
    border: 1px solid rgba(48, 164, 108, 0.25);
    color: var(--success);
  }

  .banner-icon { font-size: 16px; flex-shrink: 0; }

  /* Path bar */
  .path-bar {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text-dim);
    margin-bottom: 20px;
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .path-bar svg { flex-shrink: 0; opacity: 0.5; }

  /* Project cards */
  .project-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .project-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px 20px;
    transition: border-color 0.15s;
  }

  .project-card:hover { border-color: #3e4460; }

  .project-card.selected {
    border-color: var(--danger);
    background: linear-gradient(135deg, var(--surface), rgba(229, 72, 77, 0.04));
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .card-info { flex: 1; min-width: 0; }

  .card-title {
    font-size: 15px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 4px;
  }

  .slot-badge {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 1px 7px;
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
  }

  .card-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 14px;
    margin-top: 8px;
    font-size: 12px;
    color: var(--text-dim);
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .meta-item svg { opacity: 0.5; }

  .tag {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 500;
  }

  .tag-online {
    background: rgba(48, 164, 108, 0.15);
    color: var(--success);
  }

  .tag-offline {
    background: var(--surface2);
    color: var(--text-dim);
  }

  .tag-empty {
    background: rgba(245, 166, 35, 0.12);
    color: var(--warning);
  }

  .card-actions {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .screens-list {
    margin-top: 10px;
    padding: 8px 12px;
    background: var(--surface2);
    border-radius: var(--radius-sm);
    font-size: 12px;
    color: var(--text-dim);
  }

  .screens-list strong { color: var(--text); font-weight: 500; }

  /* Confirm modal */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.6);
    backdrop-filter: blur(4px);
    z-index: 100;
    justify-content: center;
    align-items: center;
  }

  .modal-overlay.active { display: flex; }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 28px;
    max-width: 440px;
    width: 90%;
    box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
  }

  .modal h2 {
    font-size: 17px;
    font-weight: 600;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .modal p {
    font-size: 13px;
    color: var(--text-dim);
    line-height: 1.6;
    margin-bottom: 8px;
  }

  .modal .detail-box {
    background: var(--surface2);
    border-radius: var(--radius-sm);
    padding: 10px 14px;
    margin: 12px 0;
    font-size: 12px;
    font-family: "Cascadia Code", "Fira Code", "Consolas", monospace;
    color: var(--text-dim);
  }

  .modal-actions {
    display: flex;
    justify-content: flex-end;
    gap: 8px;
    margin-top: 20px;
  }

  .modal-actions .btn { padding: 9px 20px; }

  /* Loading */
  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    font-size: 14px;
  }

  .spinner {
    width: 28px;
    height: 28px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* Empty state */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .icon { font-size: 36px; margin-bottom: 12px; }
  .empty-state h3 { font-size: 16px; color: var(--text); margin-bottom: 6px; }
  .empty-state p { font-size: 13px; }

  /* Toast */
  .toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .toast {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 18px;
    font-size: 13px;
    box-shadow: 0 8px 30px rgba(0, 0, 0, 0.4);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: slideIn 0.25s ease;
  }

  .toast-success { border-color: rgba(48, 164, 108, 0.4); }
  .toast-error { border-color: rgba(229, 72, 77, 0.4); }

  @keyframes slideIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Stat summary */
  .stats {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
  }

  .stat-card {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 14px 16px;
  }

  .stat-label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="logo">V</div>
      <h1>VMP Project Manager <span>NovaStar</span></h1>
    </div>
    <button class="btn" onclick="loadProjects()" id="refreshBtn">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M1.5 8a6.5 6.5 0 0 1 11.25-4.5M14.5 8a6.5 6.5 0 0 1-11.25 4.5"/><path d="M13 1v3.5h-3.5M3 15v-3.5h3.5"/></svg>
      Refresh
    </button>
  </div>

  <div id="bannerArea"></div>
  <div id="pathBar" class="path-bar" style="display:none">
    <svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4.5V13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6.5a1 1 0 0 0-1-1H7.5L6 3.5H3a1 1 0 0 0-1 1z"/></svg>
    <span id="pathText"></span>
  </div>

  <div id="stats" class="stats" style="display:none"></div>
  <div id="content">
    <div class="loading"><div class="spinner"></div>Scanning VMP projects...</div>
  </div>
</div>

<div class="modal-overlay" id="confirmModal">
  <div class="modal">
    <h2>
      <svg width="18" height="18" viewBox="0 0 16 16" fill="none" stroke="var(--danger)" stroke-width="1.8"><circle cx="8" cy="8" r="6.5"/><path d="M8 5v3.5M8 10.5v.5"/></svg>
      Remove Project
    </h2>
    <p id="modalText"></p>
    <div class="detail-box" id="modalDetail"></div>
    <p style="color: var(--success); font-size: 12px;">A backup will be created before removal.</p>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">Cancel</button>
      <button class="btn btn-danger" id="confirmBtn" onclick="confirmRemove()">Remove Project</button>
    </div>
  </div>
</div>

<div class="toast-container" id="toasts"></div>

<script>
const API = "";
let projectData = null;
let pendingRemoveSlot = null;

async function loadProjects() {
  const content = document.getElementById("content");
  content.innerHTML = '<div class="loading"><div class="spinner"></div>Scanning VMP projects...</div>';

  try {
    const res = await fetch(API + "/api/projects");
    projectData = await res.json();
    render();
  } catch (e) {
    content.innerHTML = `<div class="empty-state">
      <div class="icon">!</div>
      <h3>Connection Error</h3>
      <p>Could not connect to the server. Make sure it is running.</p>
    </div>`;
  }
}

function render() {
  const bannerArea = document.getElementById("bannerArea");
  const pathBar = document.getElementById("pathBar");
  const statsDiv = document.getElementById("stats");
  const content = document.getElementById("content");

  // VMP running warning
  if (projectData.vmpRunning) {
    bannerArea.innerHTML = `<div class="banner banner-danger">
      <span class="banner-icon">!</span>
      <span><strong>VMP is currently running.</strong> Close VMP before removing projects to avoid data corruption.</span>
    </div>`;
  } else {
    bannerArea.innerHTML = `<div class="banner banner-success">
      <span class="banner-icon">&#10003;</span>
      <span>VMP is not running. Safe to manage projects.</span>
    </div>`;
  }

  // Path
  if (projectData.vmpBase) {
    pathBar.style.display = "flex";
    document.getElementById("pathText").textContent = projectData.vmpBase;
  }

  // Stats
  const projects = projectData.projects || [];
  const totalSize = projects.reduce((s, p) => s + p.folderSizeBytes, 0);
  const withScreens = projects.filter(p => p.screens.length > 0).length;

  statsDiv.style.display = "flex";
  statsDiv.innerHTML = `
    <div class="stat-card">
      <div class="stat-label">Project Slots</div>
      <div class="stat-value">${projects.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">In Manager.ini</div>
      <div class="stat-value">${projects.filter(p => p.inManager).length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">With Screens</div>
      <div class="stat-value">${withScreens}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Total Size</div>
      <div class="stat-value">${(totalSize / (1024 * 1024)).toFixed(1)} MB</div>
    </div>
  `;

  // Project list
  if (projects.length === 0) {
    content.innerHTML = `<div class="empty-state">
      <div class="icon">&#9744;</div>
      <h3>No Projects Found</h3>
      <p>No VMP project folders were detected.</p>
    </div>`;
    return;
  }

  content.innerHTML = '<div class="project-list">' + projects.map(p => {
    const hasScreens = p.screens.length > 0;
    const statusTag = !p.hasDataJson
      ? '<span class="tag tag-empty">No Data</span>'
      : hasScreens
        ? '<span class="tag tag-online">Has Screens</span>'
        : '<span class="tag tag-offline">Empty Project</span>';

    return `<div class="project-card" id="card-${p.slotId}">
      <div class="card-top">
        <div class="card-info">
          <div class="card-title">
            <span class="slot-badge">Slot ${p.slotId}</span>
            ${p.projectName}
            ${statusTag}
          </div>
          <div class="card-meta">
            ${p.managerEntry ? `
              <div class="meta-item">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="14" height="10" rx="1.5"/><path d="M4 7h2M4 10h5"/></svg>
                ${p.managerEntry.deviceDir} &mdash; ${p.managerEntry.customName}
              </div>
              <div class="meta-item">
                <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="8" cy="8" r="6.5"/><path d="M4.5 8h7M8 4.5v7"/></svg>
                ${p.managerEntry.customIp}:${p.managerEntry.portid}
              </div>
            ` : '<div class="meta-item" style="color:var(--warning)">Not in manager.ini</div>'}
            <div class="meta-item">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M13 14H3V2h7l3 3v9z"/></svg>
              ${p.folderSizeMB} MB
            </div>
            ${hasScreens ? `<div class="meta-item">
              <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1.5" y="2.5" width="13" height="9" rx="1"/><path d="M5 14h6"/></svg>
              ${p.screens.length} screen${p.screens.length !== 1 ? 's' : ''}
            </div>` : ''}
          </div>
          ${hasScreens ? `<div class="screens-list"><strong>Screens:</strong> ${p.screens.join(', ')}</div>` : ''}
        </div>
        <div class="card-actions">
          <button class="btn btn-sm" onclick="openFolder('${p.folderPath.replace(/\\/g, '\\\\')}')">
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M2 4.5V13a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V6.5a1 1 0 0 0-1-1H7.5L6 3.5H3a1 1 0 0 0-1 1z"/></svg>
            Open
          </button>
          <button class="btn btn-sm btn-danger" onclick="requestRemove('${p.slotId}')" ${projectData.vmpRunning ? 'disabled title="Close VMP first"' : ''}>
            <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 5h10M5.5 5V3.5a1 1 0 0 1 1-1h3a1 1 0 0 1 1 1V5M6.5 7.5v4M9.5 7.5v4"/><path d="M4 5l.5 8.5a1 1 0 0 0 1 .5h5a1 1 0 0 0 1-.5L12 5"/></svg>
            Remove
          </button>
        </div>
      </div>
    </div>`;
  }).join('') + '</div>';
}

function requestRemove(slotId) {
  const project = projectData.projects.find(p => p.slotId === slotId);
  if (!project) return;

  pendingRemoveSlot = slotId;

  document.getElementById("modalText").innerHTML =
    `Are you sure you want to remove <strong>${project.projectName}</strong> (Slot ${slotId})?
     This will delete the project folder and remove it from manager.ini.`;

  document.getElementById("modalDetail").innerHTML =
    `Path: ${project.folderPath}\nSize: ${project.folderSizeMB} MB` +
    (project.screens.length ? `\nScreens: ${project.screens.join(', ')}` : '');

  // Highlight card
  document.querySelectorAll('.project-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById('card-' + slotId);
  if (card) card.classList.add('selected');

  document.getElementById("confirmModal").classList.add("active");
}

function closeModal() {
  document.getElementById("confirmModal").classList.remove("active");
  document.querySelectorAll('.project-card').forEach(c => c.classList.remove('selected'));
  pendingRemoveSlot = null;
}

async function confirmRemove() {
  if (!pendingRemoveSlot) return;
  const slotId = pendingRemoveSlot;
  const btn = document.getElementById("confirmBtn");
  btn.textContent = "Removing...";
  btn.disabled = true;

  try {
    const res = await fetch(API + "/api/remove", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ slotId }),
    });
    const result = await res.json();
    closeModal();

    if (result.success) {
      showToast("Project removed successfully. Backup saved.", "success");
      loadProjects();
    } else {
      showToast("Error: " + result.error, "error");
    }
  } catch (e) {
    closeModal();
    showToast("Network error: " + e.message, "error");
  } finally {
    btn.textContent = "Remove Project";
    btn.disabled = false;
  }
}

async function openFolder(folderPath) {
  try {
    await fetch(API + "/api/open-folder", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ folderPath }),
    });
  } catch (e) {}
}

function showToast(message, type) {
  const container = document.getElementById("toasts");
  const toast = document.createElement("div");
  toast.className = `toast toast-${type}`;
  toast.innerHTML = `<span>${type === 'success' ? '&#10003;' : '!'}</span> ${message}`;
  container.appendChild(toast);
  setTimeout(() => toast.remove(), 5000);
}

// Keyboard shortcut
document.addEventListener("keydown", (e) => {
  if (e.key === "Escape") closeModal();
});

// Initial load
loadProjects();
</script>
</body>
</html>
